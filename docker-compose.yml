services:
  app:
    build:
      context: .
    env_file:
      - .env.local
    ports:
      - "3010:3010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
