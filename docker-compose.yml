x-app-build: &app-build
  context: .
  args:
    PORT: ${PORT:-3010}

x-app-env: &app-env
  - .env.local

x-app-image: &app-image hopfner-dev-local:latest

services:
  app:
    image: *app-image
    build: *app-build
    env_file: *app-env
    init: true
    ports:
      - "${PORT:-3010}:${PORT:-3010}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${PORT:-3010}/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  worker:
    image: *app-image
    build: *app-build
    env_file: *app-env
    init: true
    command: ["node", ".worker-dist/scripts/agent-worker.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", ".worker-dist/scripts/agent-worker.js", "--check"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      app:
        condition: service_healthy
