services:
  app:
    build:
      context: .
      args:
        PORT: ${PORT:-3010}
    env_file:
      - .env.local
    ports:
      - "${PORT:-3010}:${PORT:-3010}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3010}/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
